services:
  postgres:
    image: postgres:16
    container_name: motorcare-staging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-motorcare_staging}
      POSTGRES_USER: ${POSTGRES_USER:-motorcare_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-motorcare_user} -d ${POSTGRES_DB:-motorcare_staging}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - motorcare-staging

  api:
    image: ${API_IMAGE:-ghcr.io/yigitcvk/motorcare-api:staging}
    build:
      context: .
      dockerfile: MotorCare.Api/Dockerfile
    pull_policy: always
    container_name: motorcare-staging-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ASPNETCORE_URLS: http://0.0.0.0:8080
      MOTORCARE_COMMIT_SHA: ${MOTORCARE_COMMIT_SHA:-unknown}
      MOTORCARE_BUILD_TIME: ${MOTORCARE_BUILD_TIME:-unknown}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-motorcare_staging};Username=${POSTGRES_USER:-motorcare_user};Password=${POSTGRES_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER:-BakimSuite}
      Jwt__Audience: ${JWT_AUDIENCE:-BakimSuite}
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES:-60}
      Jwt__RefreshTokenDays: ${JWT_REFRESH_TOKEN_DAYS:-7}
      Elastic__Uri: ${ELASTIC_URI:-}
      Elastic__Username: ${ELASTIC_USERNAME:-}
      Elastic__Password: ${ELASTIC_PASSWORD:-}
      Elastic__IndexFormat: ${ELASTIC_INDEX_FORMAT:-motorcare-api-staging-{0:yyyy.MM}}
      DataProtection__KeysPath: /var/lib/motorcare/dataprotection
      Email__LogEmailBodyInDevelopment: ${EMAIL_LOG_BODY_IN_DEVELOPMENT:-true}
    volumes:
      - api_dataprotection:/var/lib/motorcare/dataprotection
    ports:
      - "127.0.0.1:${API_HOST_PORT:-5002}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - motorcare-staging

  app:
    image: ${APP_IMAGE:-ghcr.io/yigitcvk/motorcare-app:staging}
    build:
      context: .
      dockerfile: MotorCare.App/Dockerfile
    pull_policy: always
    container_name: motorcare-staging-app
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ASPNETCORE_URLS: http://0.0.0.0:8080
      MOTORCARE_COMMIT_SHA: ${MOTORCARE_COMMIT_SHA:-unknown}
      MOTORCARE_BUILD_TIME: ${MOTORCARE_BUILD_TIME:-unknown}
      ApiBaseUrl: ${APP_INTERNAL_API_BASE_URL:-http://api:8080}
      DataProtection__KeysPath: /var/lib/motorcare/dataprotection
    volumes:
      - app_dataprotection:/var/lib/motorcare/dataprotection
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-5001}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - motorcare-staging

  migrator:
    profiles: ["tools"]
    image: ${MIGRATOR_IMAGE:-ghcr.io/yigitcvk/motorcare-migrator:staging}
    build:
      context: .
      dockerfile: MotorCare.Api/Dockerfile.migrator
    pull_policy: always
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      MOTORCARE_COMMIT_SHA: ${MOTORCARE_COMMIT_SHA:-unknown}
      MOTORCARE_BUILD_TIME: ${MOTORCARE_BUILD_TIME:-unknown}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-motorcare_staging};Username=${POSTGRES_USER:-motorcare_user};Password=${POSTGRES_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER:-BakimSuite}
      Jwt__Audience: ${JWT_AUDIENCE:-BakimSuite}
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES:-60}
      Jwt__RefreshTokenDays: ${JWT_REFRESH_TOKEN_DAYS:-7}
      Elastic__Uri: ${ELASTIC_URI:-}
      Elastic__Username: ${ELASTIC_USERNAME:-}
      Elastic__Password: ${ELASTIC_PASSWORD:-}
      DataProtection__KeysPath: /tmp/dataprotection
      Email__LogEmailBodyInDevelopment: ${EMAIL_LOG_BODY_IN_DEVELOPMENT:-true}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - motorcare-staging
    restart: "no"

networks:
  motorcare-staging:
    driver: bridge

volumes:
  postgres_data:
  api_dataprotection:
  app_dataprotection:
