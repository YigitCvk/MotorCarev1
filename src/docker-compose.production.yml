services:
  postgres:
    image: postgres:16
    container_name: motorcare-production-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-motorcare}
      POSTGRES_USER: ${POSTGRES_USER:-motorcare_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-motorcare_user} -d ${POSTGRES_DB:-motorcare}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - motorcare-production

  api:
    image: ${API_IMAGE:-ghcr.io/yigitcvk/motorcare-api:production}
    build:
      context: .
      dockerfile: MotorCare.Api/Dockerfile
    pull_policy: always
    container_name: motorcare-production-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080
      MOTORCARE_COMMIT_SHA: ${MOTORCARE_COMMIT_SHA:-unknown}
      MOTORCARE_BUILD_TIME: ${MOTORCARE_BUILD_TIME:-unknown}
      AllowedHosts: ${ALLOWED_HOSTS:-garajpass.com;www.garajpass.com}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-motorcare};Username=${POSTGRES_USER:-motorcare_user};Password=${POSTGRES_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER:-GarajPass}
      Jwt__Audience: ${JWT_AUDIENCE:-GarajPass.Client}
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES:-60}
      Jwt__RefreshTokenDays: ${JWT_REFRESH_TOKEN_DAYS:-7}
      Elastic__Uri: ${ELASTIC_URI:-}
      Elastic__Username: ${ELASTIC_USERNAME:-}
      Elastic__Password: ${ELASTIC_PASSWORD:-}
      Elastic__IndexFormat: ${ELASTIC_INDEX_FORMAT:-motorcare-api-prod-{0:yyyy.MM}}
      DataProtection__KeysPath: /var/lib/motorcare/dataprotection
      Email__Provider: ${Email__Provider:-Smtp}
      Email__FromEmail: ${Email__FromEmail:-no-reply@garajpass.com}
      Email__FromName: ${Email__FromName:-GarajPass}
      Email__SmtpHost: ${Email__SmtpHost:-}
      Email__SmtpPort: ${Email__SmtpPort:-587}
      Email__SmtpUsername: ${Email__SmtpUsername:?Email__SmtpUsername is required}
      Email__SmtpPassword: ${Email__SmtpPassword:?Email__SmtpPassword is required}
      Email__EnableSsl: ${Email__EnableSsl:-true}
      Email__UseDefaultCredentials: ${Email__UseDefaultCredentials:-false}
      Email__AppBaseUrl: ${Email__AppBaseUrl:-https://garajpass.com}
      Email__SendEmails: ${Email__SendEmails:-true}
      Email__LogEmailBodyInDevelopment: ${Email__LogEmailBodyInDevelopment:-false}
    volumes:
      - api_dataprotection:/var/lib/motorcare/dataprotection
    ports:
      - "127.0.0.1:${API_HOST_PORT:-5002}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - motorcare-production

  app:
    image: ${APP_IMAGE:-ghcr.io/yigitcvk/motorcare-app:production}
    build:
      context: .
      dockerfile: MotorCare.App/Dockerfile
    pull_policy: always
    container_name: motorcare-production-app
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080
      MOTORCARE_COMMIT_SHA: ${MOTORCARE_COMMIT_SHA:-unknown}
      MOTORCARE_BUILD_TIME: ${MOTORCARE_BUILD_TIME:-unknown}
      AllowedHosts: ${ALLOWED_HOSTS:-garajpass.com;www.garajpass.com}
      ApiBaseUrl: ${APP_INTERNAL_API_BASE_URL:-http://api:8080}
      PublicReports__BaseUrl: ${PublicReports__BaseUrl:-https://garajpass.com}
      Seo__SiteName: ${Seo__SiteName:-GarajPass}
      Seo__SiteBaseUrl: ${Seo__SiteBaseUrl:-https://garajpass.com}
      Seo__RobotsIndexEnabled: ${Seo__RobotsIndexEnabled:-false}
      Seo__OgImageUrl: ${Seo__OgImageUrl:-/images/og-garajpass.svg}
      DataProtection__KeysPath: /var/lib/motorcare/dataprotection
    volumes:
      - app_dataprotection:/var/lib/motorcare/dataprotection
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-5001}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - motorcare-production

  migrator:
    profiles: ["tools"]
    image: ${MIGRATOR_IMAGE:-ghcr.io/yigitcvk/motorcare-migrator:production}
    build:
      context: .
      dockerfile: MotorCare.Api/Dockerfile.migrator
    pull_policy: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      MOTORCARE_COMMIT_SHA: ${MOTORCARE_COMMIT_SHA:-unknown}
      MOTORCARE_BUILD_TIME: ${MOTORCARE_BUILD_TIME:-unknown}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-motorcare};Username=${POSTGRES_USER:-motorcare_user};Password=${POSTGRES_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER:-GarajPass}
      Jwt__Audience: ${JWT_AUDIENCE:-GarajPass.Client}
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES:-60}
      Jwt__RefreshTokenDays: ${JWT_REFRESH_TOKEN_DAYS:-7}
      Elastic__Uri: ${ELASTIC_URI:-}
      Elastic__Username: ${ELASTIC_USERNAME:-}
      Elastic__Password: ${ELASTIC_PASSWORD:-}
      Elastic__IndexFormat: ${ELASTIC_INDEX_FORMAT:-motorcare-api-prod-{0:yyyy.MM}}
      DataProtection__KeysPath: /tmp/dataprotection
      Email__LogEmailBodyInDevelopment: ${Email__LogEmailBodyInDevelopment:-false}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - motorcare-production
    restart: "no"

networks:
  motorcare-production:
    driver: bridge

volumes:
  postgres_data:
  api_dataprotection:
  app_dataprotection:
